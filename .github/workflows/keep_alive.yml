name: Keep Streamlit App Alive

on:
  schedule:
    # Ping every 24 hours at noon UTC
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://wnba-minutes-projector-kp.streamlit.app/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "WARNING: App returned status $STATUS"
            exit 1
          fi
          echo "App is alive."
