name: Keep Streamlit App Alive

on:
  schedule:
    # Ping every 6 hours to prevent Streamlit Cloud from sleeping
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Wake Streamlit app via headless browser
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            console.log('Loading app...');
            try {
              await page.goto('https://wnba-minutes-projector-kp.streamlit.app/', { timeout: 120000 });
              // If the app is sleeping, there's a 'Yes, get this app back up!' button
              const wakeBtn = page.locator('text=Yes, get this app back up');
              if (await wakeBtn.isVisible({ timeout: 5000 }).catch(() => false)) {
                console.log('App was sleeping — clicking wake button...');
                await wakeBtn.click();
                await page.waitForTimeout(30000);
              }
              // Wait for Streamlit to finish loading
              await page.waitForSelector('[data-testid=\"stApp\"]', { timeout: 90000 });
              console.log('App is alive. Title:', await page.title());
            } catch (e) {
              console.error('Error:', e.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          "
