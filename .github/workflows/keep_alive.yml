name: Keep Streamlit App Alive

on:
  schedule:
    # Ping every 6 hours to prevent Streamlit Cloud from sleeping
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake and ping Streamlit app
        run: |
          # First request wakes the app if sleeping (may take up to 60s)
          echo "Sending wake request..."
          curl -s -o /dev/null --max-time 90 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://wnba-minutes-projector-kp.streamlit.app/
          # Second request confirms it's up
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            https://wnba-minutes-projector-kp.streamlit.app/)
          echo "HTTP status: $STATUS"
          echo "App is alive."
