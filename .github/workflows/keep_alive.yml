name: Keep Streamlit App Alive

on:
  schedule:
    # Ping every 6 hours to prevent Streamlit Cloud from sleeping
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Wake Streamlit app via headless browser
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            console.log('Loading app...');
            try {
              // Wait for network idle so the app fully boots (cold start can take 60-90s)
              await page.goto('https://wnba-minutes-projector-kp.streamlit.app/', {
                timeout: 180000,
                waitUntil: 'networkidle',
              });
              // If the app is sleeping, there's a wake button — click it and wait again
              const wakeBtn = page.locator('text=Yes, get this app back up');
              if (await wakeBtn.isVisible({ timeout: 3000 }).catch(() => false)) {
                console.log('App was sleeping — clicking wake button...');
                await wakeBtn.click();
                await page.waitForLoadState('networkidle', { timeout: 180000 });
              }
              console.log('App is alive. Title:', await page.title());
            } catch (e) {
              console.error('Error:', e.message);
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          "
