name: Update Snowflake Data

on:
  schedule:
    # Runs at 10 AM, 2 PM, 6 PM, and 10 PM ET (UTC-4 in summer)
    # = 14:00, 18:00, 22:00, 02:00 UTC
    - cron: "0 14 * * *"
    - cron: "0 18 * * *"
    - cron: "0 22 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch:  # also allows manual trigger from GitHub UI

jobs:
  export-and-push:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Snowflake data to CSV
        env:
          SNOWFLAKE_PAT: ${{ secrets.SNOWFLAKE_PAT }}
          PYTHONPATH: 'C:\Users\kar.patel\AppData\Local\Packages\PythonSoftwareFoundation.Python.3.13_qbz5n2kfra8p0\LocalCache\local-packages\Python313\site-packages'
        run: |
          $env:PATH = "C:\Users\kar.patel\AppData\Local\Microsoft\WindowsApps;" + $env:PATH
          & "C:\Users\kar.patel\AppData\Local\Microsoft\WindowsApps\python3.13.exe" export_snowflake_data.py

      - name: Commit and push updated CSVs
        shell: powershell
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/snowflake_*.csv
          $diff = git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            $ts = (Get-Date -Format "yyyy-MM-dd HH:mm") + " UTC"
            git commit -m "Auto-update Snowflake data $ts"
            git pull --rebase
            git push
          } else {
            Write-Output "No changes to commit"
          }
