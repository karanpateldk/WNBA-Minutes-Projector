name: Update Snowflake Data

on:
  schedule:
    # Runs at 10 AM, 2 PM, 6 PM, and 10 PM ET (UTC-4 in summer)
    # = 14:00, 18:00, 22:00, 02:00 UTC
    - cron: "0 14 * * *"
    - cron: "0 18 * * *"
    - cron: "0 22 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch:  # also allows manual trigger from GitHub UI

jobs:
  export-and-push:
    runs-on: ubuntu-latest  # change to [self-hosted] if DK blocks GitHub IPs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install snowflake-connector-python pandas

      - name: Export Snowflake data to CSV
        env:
          SNOWFLAKE_PAT: ${{ secrets.SNOWFLAKE_PAT }}
        run: python export_snowflake_data.py

      - name: Commit and push updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/snowflake_*.csv
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "Auto-update Snowflake data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
